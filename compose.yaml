services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: emergency_sqlserver
    restart: always

    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${DB_PASSWORD}

    ports:
      - "${DB_PORT}:1433"

    volumes:
      - sql_data:/var/opt/mssql

volumes:
  sql_data: